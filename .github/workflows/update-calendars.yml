name: Update booking calendars

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-calendars:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch booking calendars
        run: npm run fetch-calendars
        env:
          BOOKING_CALENDAR_1: ${{ secrets.BOOKING_CALENDAR_1 }}
          BOOKING_CALENDAR_2: ${{ secrets.BOOKING_CALENDAR_2 }}

      - name: Check for calendar changes
        id: changes
        run: |
          if git status --porcelain=data | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated calendar data
        uses: stefanzweifel/git-auto-commit-action@v5
        if: steps.changes.outputs.changed == 'true'
        with:
          commit_message: 'chore: update booking calendars'
          file_pattern: data/busy-*.json
